<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>If Else & Loop Demo</title>
</head>
<body>

<div id="outputBox">ผลลัพธ์จะแสดงที่นี่...</div>
<button onclick="runDemo()">Run Code</button>

<script>
function runDemo() {
    const output = [];

    // ค่าตั้งต้น
    let score = 100;

    // เงื่อนไข if / else
    if (score >= 50) {
        output.push("ทดสอบ: ผ่าน");
        console.log("ทดสอบ: ผ่าน");
    } else {
        output.push("ทดสอบ: ไม่ผ่าน");
        console.log("ทดสอบ: ไม่ผ่าน");
    }

    // วน loop 5 รอบ
    for (let i = 0; i < 5; i++) {
        output.push("รอบที่: " + i);
        console.log("รอบที่:", i);
    }

    // อัปเดตผลลัพธ์บนหน้าเว็บ
    document.getElementById("outputBox").textContent = output.join("\n");
}
</script>

</body>
</html>
