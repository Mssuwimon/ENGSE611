<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Weather API Demo</title>
</head>

<body>

<h2>ตัวอย่าง Weather API</h2>

<p>อำเภอป่าซาง จังหวัดลำพูน</p>

<button id="loadWeather">โหลดข้อมูลสภาพอากาศ</button>

<pre id="result">กดปุ่มเพื่อโหลดข้อมูล...</pre>

<script>

// -----------------------------
// ดึง element จากหน้าเว็บ
// -----------------------------
const button = document.getElementById("loadWeather");
const result = document.getElementById("result");


// -----------------------------
// 📍 กำหนดตำแหน่งสถานที่
// ถ้าจะเปลี่ยนจังหวัดให้แก้ latitude และ longitude
// -----------------------------
const latitude = 18.526;   // ละติจูด อำเภอป่าซาง
const longitude = 98.939;  // ลองจิจูด อำเภอป่าซาง


// -----------------------------
// เมื่อกดปุ่มให้เรียก API
// -----------------------------
button.addEventListener("click", async () => {

try {

    // ---------------------------------
    // URL ของ Weather API
    // ถ้าจะเปลี่ยนสถานที่ แก้ latitude / longitude ด้านบน
    // ---------------------------------
    const url =
    "https://api.open-meteo.com/v1/forecast"+
    "?latitude=" + latitude +
    "&longitude=" + longitude +
    "&current=temperature_2m,relative_humidity_2m,wind_speed_10m";


    // ส่ง request ไปยัง API
    const response = await fetch(url);

    // ตรวจสอบว่าการเชื่อมต่อสำเร็จหรือไม่
    if(!response.ok){
        throw new Error("ไม่สามารถเชื่อมต่อ API ได้");
    }

    // แปลงข้อมูล JSON เป็น JavaScript Object
    const data = await response.json();

    // ดึงข้อมูลสภาพอากาศจาก JSON
    const weather = data.current;


    // -----------------------------
    // แสดงข้อมูลบนหน้าเว็บ
    // -----------------------------
    result.textContent =
    "สถานที่ : อำเภอป่าซาง จังหวัดลำพูน\n" +
    "อุณหภูมิ : " + weather.temperature_2m + " °C\n" +
    "ความชื้น : " + weather.relative_humidity_2m + " %\n" +
    "ความเร็วลม : " + weather.wind_speed_10m + " km/h\n" +
    "เวลา : " + weather.time;


    // แสดง JSON ใน console
    console.log(data);

}
catch(error){

    result.textContent = "เกิดข้อผิดพลาด : " + error.message;

}

});

</script>

</body>
</html>
