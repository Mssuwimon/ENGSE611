<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Weather API Demo</title>

<style>
body{
font-family: Arial;
margin:40px;
}

button{
padding:10px 16px;
background:#2d7df6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

pre{
background:#f4f4f4;
padding:15px;
margin-top:20px;
border-radius:8px;
}
</style>

</head>

<body>

<h2>ตัวอย่าง Weather API</h2>
<p>อำเภอดอยสะเก็ด จังหวัดเชียงใหม่</p>

<button id="loadWeather">
โหลดข้อมูลสภาพอากาศ
</button>

<pre id="result">
กดปุ่มเพื่อโหลดข้อมูล...
</pre>


<script>

// ดึง element จากหน้าเว็บ
const button = document.getElementById("loadWeather");
const result = document.getElementById("result");


// เมื่อคลิกปุ่มให้เรียก API
button.addEventListener("click", async () => {


// URL ของ Weather API (Open-Meteo)
const url =
"https://api.open-meteo.com/v1/forecast" +
"?latitude=18.878&longitude=99.136" +
"&current=temperature_2m,relative_humidity_2m,wind_speed_10m";

try {

// ส่ง request ไปยัง API
const response = await fetch(url);


// ตรวจสอบว่าการเชื่อมต่อสำเร็จหรือไม่
if(!response.ok){
throw new Error("ไม่สามารถเชื่อมต่อ API ได้");
}


// แปลงข้อมูล JSON จาก server เป็น JavaScript Object
const data = await response.json();


// ดึงข้อมูลสภาพอากาศปัจจุบันจาก JSON
const weather = data.current;


// แสดงผลบนหน้าเว็บ
result.textContent =
"สถานที่ : อำเภอดอยสะเก็ด จังหวัดเชียงใหม่\n" +
"อุณหภูมิ : " + weather.temperature_2m + " °C\n" +
"ความชื้น : " + weather.relative_humidity_2m + " %\n" +
"ความเร็วลม : " + weather.wind_speed_10m + " km/h\n" +
"เวลา : " + weather.time;


// แสดงโครงสร้าง JSON ใน Console
console.log(data);


}catch(error){

// ถ้าเกิด error
result.textContent = "เกิดข้อผิดพลาด : " + error.message;

}

});

</script>

</body>
</html>
