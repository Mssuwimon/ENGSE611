<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Array Computation</title>
</head>
<body>

<h3>ผลลัพธ์:</h3>
<pre id="output"></pre>

<script>
let numbers = [30, 27, 84, 36, 24, 2, 74, 37, 8, 50];

let min = numbers[0];
let max = numbers[0];
let sum = 0;

// หา min & max
for (let i = 1; i < numbers.length; i++) {
    if (numbers[i] < min) min = numbers[i];
    if (numbers[i] > max) max = numbers[i];
}

// หาผลรวม
for (let i = 0; i < numbers.length; i++) {
    sum += numbers[i];
}

// หา average
let avg = sum / numbers.length;

// แสดงใน console
console.log("Numbers:", numbers.join(" "));
console.log("Min:", min);
console.log("Max:", max);
console.log("Sum:", sum);
console.log("Average:", avg);

// แสดงบนหน้าเว็บ
document.getElementById("output").textContent =
    "Numbers: " + numbers.join(" ") + "\n" +
    "Min: " + min + "\n" +
    "Max: " + max + "\n" +
    "Sum: " + sum + "\n" +
    "Average: " + avg;
</script>

</body>
</html>
