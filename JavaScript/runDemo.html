<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Variables Demo</title>
</head>

<body>

<h1>ตัวอย่างการใช้ตัวแปร JavaScript</h1>

<button onclick="runDemo()">Run Code</button>

<pre id="outputBox"></pre>

<script>
function runDemo() {
    // ล้าง Console ทุกครั้งที่รัน
    console.clear();
    const output = [];

    let text = "JavaScript เจ๋งมาก"
    let firstName = "สมชาย";

    //template literals
    output.push(`สวัสดี ${firstName}`);
    console.log(`สวัสดี ${firstName}`);

    //String methods
    output.push("ตัวเล็ก " + text.toLowerCase());
    console.log("ตัวเล็ก", text.toLowerCase());
    output.push("ตัวใหญ่ " + text.toUpperCase());
    console.log("ตัวใหญ่", text.toUpperCase());

    // ตัวอย่างตัวแปร
    let studentName = "สมชาย ใจดี";
    let age = 20;
    let isStudent = true;
    const universityName = "มหาวิทยาลัยเทคโนโลยี";

    // แสดงค่าตัวแปรเริ่มต้น
    output.push("ชื่อ: " + studentName);
    console.log("ชื่อ:", studentName);

    output.push("อายุ: " + age);
    console.log("อายุ:", age);

    // เปลี่ยนค่า let
    age = 21;
    output.push("อายุใหม่: " + age);
    console.log("อายุใหม่:", age);

    // เปลี่ยนค่า const
    try {
        universityName = "มหาวิทยาลัยใหม่";
    } catch (e) {
        output.push("Error: " + e.message);
        console.error(e.message);
    }

    // แสดงผลบนหน้าเว็บ
    document.getElementById("outputBox").textContent = output.join("\n");

    //แสดงผลใน console
    console.clear();
    output.forEach(line => console.log(">" + line));
}


</script>

</body>
</html>
