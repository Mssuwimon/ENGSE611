<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Loop Practice</title>
</head>
<body>

<h3>ดูผลลัพธ์ใน Console (กด F12)</h3>

<script>
// 1) กำหนดค่า maxNumber
let maxNumber = 20;

console.clear();
console.log("=== นับ 0 ถึง maxNumber ===");

// 2) แสดง 0 → maxNumber พร้อมคู่/คี่
for (let i = 0; i <= maxNumber; i++) {
    if (i % 2 === 0) {
        console.log(i + " (คู่)");
    } else {
        console.log(i + " (คี่)");
    }
}

console.log("");

// 3) นับทีละ 2
console.log("=== นับทีละ 2 ===");
for (let i = 0; i <= maxNumber; i += 2) {
    console.log(i);
}

console.log("");

// 4) นับถอยหลัง 10 → 0
console.log("=== นับถอยหลัง ===");
for (let i = 10; i >= 0; i--) {
    console.log(i);
}

</script>

</body>
</html>
